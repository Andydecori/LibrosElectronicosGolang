<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Libros - API Go</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .stats-card { background: #e9ecef; border-radius: 10px; padding: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>📚 Sistema de Libros Electrónicos</h1>
            <div id="health-status" class="badge bg-secondary">Estado: Desconocido</div>
        </div>

        <div class="stats-card d-flex justify-content-around text-center">
            <div>
                <h4 id="total-books">0</h4>
                <p class="mb-0">Libros Registrados</p>
            </div>
            <div>
                <button onclick="checkHealth()" class="btn btn-sm btn-outline-primary">Verificar Salud</button>
            </div>
        </div>

        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h5 class="card-title">Añadir Nuevo Libro</h5>
                <div class="row g-3">
                    <div class="col-md-5">
                        <input type="text" id="title" class="form-control" placeholder="Título del libro">
                    </div>
                    <div class="col-md-5">
                        <input type="text" id="author" class="form-control" placeholder="Autor">
                    </div>
                    <div class="col-md-2">
                        <button onclick="createBook()" class="btn btn-success w-100">Guardar</button>
                    </div>
                </div>
            </div>
        </div>

        <table class="table table-hover bg-white shadow-sm rounded">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Autor</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="books-table">
                </tbody>
        </table>
    </div>

    <script>
        const API_URL = "http://localhost:8080";

        // 1. Cargar datos al iniciar
        document.addEventListener('DOMContentLoaded', () => {
            loadBooks();
            loadStats();
            checkHealth();
        });

        // Servicio 2: Listar
        async function loadBooks() {
            const resp = await fetch(`${API_URL}/books`);
            const books = await resp.json();
            const table = document.getElementById('books-table');
            table.innerHTML = '';
            books.forEach(b => {
                table.innerHTML += `
                    <tr>
                        <td>${b.id}</td>
                        <td>${b.title}</td>
                        <td>${b.author}</td>
                        <td>
                            <button class="btn btn-danger btn-sm" onclick="deleteBook(${b.id})">Eliminar</button>
                        </td>
                    </tr>
                `;
            });
        }

        // Servicio 1: Crear
        async function createBook() {
            const title = document.getElementById('title').value;
            const author = document.getElementById('author').value;
            await fetch(`${API_URL}/books`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, author })
            });
            document.getElementById('title').value = '';
            document.getElementById('author').value = '';
            loadBooks();
            loadStats();
        }

        // Servicio 5: Eliminar
        async function deleteBook(id) {
            if(confirm('¿Seguro que deseas eliminar este libro?')) {
                await fetch(`${API_URL}/books/${id}`, { method: 'DELETE' });
                loadBooks();
                loadStats();
            }
        }

        // Servicio 7: Estadísticas
        async function loadStats() {
            const resp = await fetch(`${API_URL}/books/stats`);
            const data = await resp.json();
            document.getElementById('total-books').innerText = data.total_libros;
        }

        // Servicio 8: Health Check
        async function checkHealth() {
            try {
                const resp = await fetch(`${API_URL}/health`);
                const data = await resp.json();
                const badge = document.getElementById('health-status');
                badge.innerText = `Estado: ${data.status}`;
                badge.className = "badge bg-success";
            } catch (e) {
                document.getElementById('health-status').className = "badge bg-danger";
            }
        }
    </script>
</body>
</html>
